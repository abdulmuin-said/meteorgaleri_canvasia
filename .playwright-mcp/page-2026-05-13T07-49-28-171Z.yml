        - paragraph [ref=e110]: Toplanan bilgiler yalnızca siparişlerinizi yerine getirmek, size ürünlerimiz hakkında bilgi vermek ve daha iyi bir hizmet sunmak amacıyla kullanılır. Bilgileriniz kesinlikle üçüncü şahıslara satılmaz veya kiralanmaz.
        - heading "Güvenlik" [level=2] [ref=e111]
        - paragraph [ref=e112]: Tüm ödeme işlemleri 256-bit SSL sertifikası ile şifrelenir. Kredi kartı bilgileriniz sunucularımızda saklanmaz, doğrudan güvenli ödeme sağlayıcısı (Iyzico) üzerinden bankaya iletilir.
        - heading "Çerezler (Cookies)" [level=2] [ref=e113]
        - paragraph [ref=e114]: Web sitemiz, sepetinizi hatırlamak ve alışveriş deneyiminizi iyileştirmek için çerezleri kullanır. Tarayıcı ayarlarınızdan çerezleri dilediğiniz zaman kapatabilirsiniz.
