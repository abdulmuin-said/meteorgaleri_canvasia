        - heading "Giriş" [level=2] [ref=e100]
        - paragraph [ref=e101]: Canvasia ("biz", "bizim" veya "şirketimiz") olarak kişisel verilerinizin güvenliğine büyük önem veriyoruz. Bu gizlilik politikası, web sitemizi kullanırken topladığımız bilgilerin nasıl korunduğunu açıklar.
        - heading "Toplanan Bilgiler" [level=2] [ref=e102]
        - paragraph [ref=e103]: "Sipariş süreci ve iletişim formu aracılığıyla şu bilgileri toplayabiliriz:"
