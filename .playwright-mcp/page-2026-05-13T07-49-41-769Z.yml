  - main [ref=e89]:
    - generic [ref=e92]:
      - heading "Mesafeli Satış Sözleşmesi" [level=1] [ref=e93]
      - generic [ref=e94]:
        - paragraph [ref=e95]: Bu sözleşme, Canvasia üzerinden verilen siparişlerde alıcı ile satıcı arasındaki mesafeli satış koşullarını açıklar. Sipariş veren müşteri, ödeme adımını tamamladığında bu sözleşmede yer alan temel koşulları kabul etmiş sayılır.
        - heading "1. Taraflar" [level=2] [ref=e96]
        - paragraph [ref=e97]:
          - text: "Satıcı: Canvasia. Alıcı: Web sitesi üzerinden ürün veya hizmet satın alan gerçek ya da tüzel kişi. Satıcıya ait güncel iletişim bilgilerine"
          - link "İletişim" [ref=e98] [cursor=pointer]:
            - /url: /Kurumsal/Iletisim
          - text: sayfasından ulaşılabilir.
        - heading "2. Sözleşmenin Konusu" [level=2] [ref=e99]
        - paragraph [ref=e100]: İşbu sözleşmenin konusu, alıcının elektronik ortamda sipariş verdiği ürünlerin satışı, teslimi, cayma hakkı, iade koşulları ve tarafların karşılıklı hak ve yükümlülüklerinin belirlenmesidir.
        - heading "3. Ürün ve Sipariş Bilgileri" [level=2] [ref=e101]
        - paragraph [ref=e102]: Ürünün adı, adedi, varyasyon seçimi, satış bedeli, ödeme şekli, teslimat adresi ve sipariş tarihi sipariş özeti ekranında ve sipariş kayıtlarında yer alır. Kişiye özel ölçü, tasarım veya üretim tercihi içeren ürünlerde üretim süreci sipariş onayından sonra başlar.
        - heading "4. Teslimat" [level=2] [ref=e103]
        - paragraph [ref=e104]: Siparişler, ürün tipine ve üretim yoğunluğuna göre belirtilen hazırlık süresi içinde kargoya teslim edilir. Türkiye geneli gönderimlerde kargo firmasından kaynaklanan gecikmeler satıcının doğrudan kontrolü dışında olabilir.
        - heading "5. Cayma Hakkı ve İade" [level=2] [ref=e105]
        - paragraph [ref=e106]:
          - text: Standart ürünlerde cayma ve iade talepleri ilgili mevzuat çerçevesinde değerlendirilir. Müşterinin özel ölçü, özel tasarım, kişiselleştirme veya siparişe özel üretim tercihiyle hazırlanan ürünlerde cayma hakkı sınırlı olabilir. Detaylı bilgi için
          - link "İade Koşulları" [ref=e107] [cursor=pointer]:
            - /url: /Kurumsal/IadeKosullari
          - text: sayfası incelenmelidir.
        - heading "6. Ödeme ve Güvenlik" [level=2] [ref=e108]
        - paragraph [ref=e109]: Ödeme işlemleri güvenli ödeme altyapısı üzerinden gerçekleştirilir. Kart bilgileri Canvasia sunucularında saklanmaz. Ödeme sırasında kullanılan güvenlik doğrulamaları bankanız veya ödeme sağlayıcınız tarafından yürütülür.
        - heading "7. Uyuşmazlık" [level=2] [ref=e110]
        - paragraph [ref=e111]: Taraflar arasında doğabilecek uyuşmazlıklarda, yürürlükteki tüketici mevzuatı kapsamında yetkili tüketici hakem heyetleri ve tüketici mahkemeleri yetkilidir.
